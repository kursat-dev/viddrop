<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidDrop — YouTube İndirici</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --red: #ff2d2d;
    --red-dim: #3a0a0a;
    --white: #f0ece4;
    --muted: #555;
    --text: #d4cfc7;
    --success: #00e676;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 60px 24px 100px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    margin-bottom: 72px;
    animation: fadeUp 0.6s ease both;
  }

  .logo-mark {
    width: 52px;
    height: 52px;
    background: var(--red);
    display: flex;
    align-items: center;
    justify-content: center;
    clip-path: polygon(0 0, 85% 0, 100% 15%, 100% 100%, 15% 100%, 0 85%);
    flex-shrink: 0;
  }

  .logo-mark svg { width: 24px; height: 24px; fill: white; }

  .logo-text h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    color: var(--white);
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .logo-text p {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* MAIN CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 36px;
    position: relative;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--red);
  }

  /* URL INPUT */
  .input-row {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
  }

  .url-input {
    flex: 1;
    background: #000;
    border: 1px solid var(--border);
    border-right: none;
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    padding: 14px 18px;
    outline: none;
    transition: border-color 0.2s;
  }

  .url-input::placeholder { color: var(--muted); }
  .url-input:focus { border-color: var(--red); }

  .btn-fetch {
    background: var(--red);
    color: white;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    padding: 14px 24px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .btn-fetch:hover { background: #e00; }
  .btn-fetch:active { transform: scale(0.98); }
  .btn-fetch:disabled { background: #333; cursor: not-allowed; }

  /* VIDEO INFO */
  #videoInfo {
    display: none;
    margin-bottom: 28px;
    padding: 20px;
    background: #000;
    border: 1px solid var(--border);
    gap: 18px;
    animation: fadeUp 0.4s ease both;
  }

  #videoInfo.visible {
    display: flex;
  }

  #videoInfo img {
    width: 130px;
    height: 73px;
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .info-text { flex: 1; min-width: 0; }

  .info-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    color: var(--white);
    font-size: 0.95rem;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 8px;
  }

  .info-meta {
    display: flex;
    gap: 16px;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .info-meta span { display: flex; align-items: center; gap: 4px; }

  /* QUALITY SELECT */
  .quality-label {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .quality-grid {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .q-btn {
    background: #000;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .q-btn:hover { border-color: #444; color: var(--text); }

  .q-btn.active {
    border-color: var(--red);
    color: var(--white);
    background: var(--red-dim);
  }

  .q-btn .badge {
    position: absolute;
    top: -7px;
    right: -7px;
    background: var(--red);
    color: white;
    font-size: 0.55rem;
    padding: 1px 5px;
    letter-spacing: 0.05em;
  }

  /* DOWNLOAD BTN */
  .btn-download {
    width: 100%;
    background: var(--red);
    color: white;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.05em;
    padding: 18px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-download:hover { background: #e00; }
  .btn-download:active { transform: scale(0.99); }
  .btn-download:disabled { background: #222; color: #444; cursor: not-allowed; }

  /* PROGRESS */
  #progressArea {
    display: none;
    margin-top: 24px;
    animation: fadeUp 0.3s ease both;
  }

  #progressArea.visible { display: block; }

  .progress-header {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-track {
    height: 3px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--red);
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-fill.done { background: var(--success); }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 8px;
  }

  /* DONE STATE */
  .done-box {
    display: none;
    margin-top: 24px;
    padding: 20px;
    border: 1px solid var(--success);
    background: rgba(0, 230, 118, 0.05);
    align-items: center;
    gap: 14px;
    animation: fadeUp 0.4s ease both;
  }

  .done-box.visible { display: flex; }

  .done-icon {
    width: 40px;
    height: 40px;
    background: var(--success);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .done-text { flex: 1; }
  .done-text strong { display: block; color: var(--success); font-family: 'Syne', sans-serif; font-size: 0.9rem; }
  .done-text span { font-size: 0.75rem; color: var(--muted); }

  .btn-save {
    background: var(--success);
    color: #000;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    padding: 10px 18px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: opacity 0.2s;
  }

  .btn-save:hover { opacity: 0.85; }

  /* ERROR */
  .error-box {
    display: none;
    margin-top: 16px;
    padding: 14px 18px;
    border: 1px solid #ff4444;
    background: rgba(255,68,68,0.05);
    font-size: 0.8rem;
    color: #ff6666;
    animation: fadeUp 0.3s ease both;
  }

  .error-box.visible { display: block; }

  /* FOOTER */
  footer {
    margin-top: 60px;
    text-align: center;
    font-size: 0.68rem;
    color: #333;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  /* LOADER */
  .spin {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <div class="logo-text">
      <h1>VidDrop</h1>
      <p>YouTube Video İndirici</p>
    </div>
  </header>

  <div class="card">

    <!-- URL INPUT -->
    <div class="input-row">
      <input class="url-input" id="urlInput" type="text"
        placeholder="https://www.youtube.com/watch?v=..." 
        autocomplete="off" spellcheck="false">
      <button class="btn-fetch" id="fetchBtn" onclick="fetchInfo()">Getir</button>
    </div>

    <!-- VIDEO INFO -->
    <div id="videoInfo">
      <img id="thumb" src="" alt="">
      <div class="info-text">
        <div class="info-title" id="vidTitle">—</div>
        <div class="info-meta">
          <span>📺 <span id="vidChannel">—</span></span>
          <span>⏱ <span id="vidDuration">—</span></span>
          <span>👁 <span id="vidViews">—</span></span>
        </div>
      </div>
    </div>

    <!-- QUALITY -->
    <div class="quality-label">Kalite Seç</div>
    <div class="quality-grid" id="qualityGrid">
      <button class="q-btn" data-q="4k">2160p <span class="badge">4K</span></button>
      <button class="q-btn active" data-q="1080p">1080p <span class="badge">FHD</span></button>
      <button class="q-btn" data-q="720p">720p</button>
      <button class="q-btn" data-q="480p">480p</button>
      <button class="q-btn" data-q="360p">360p</button>
      <button class="q-btn" data-q="audio">🎵 MP3</button>
    </div>

    <!-- DOWNLOAD BTN -->
    <button class="btn-download" id="dlBtn" onclick="startDownload()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      İndir
    </button>

    <!-- PROGRESS -->
    <div id="progressArea">
      <div class="progress-header">
        <span id="progressStatus">İndiriliyor...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-info">
        <span id="progressSpeed">—</span>
        <span id="progressEta">ETA: —</span>
      </div>
    </div>

    <!-- DONE -->
    <div class="done-box" id="doneBox">
      <div class="done-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#000"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      </div>
      <div class="done-text">
        <strong>İndirme Tamamlandı!</strong>
        <span id="doneFilename">—</span>
      </div>
      <a class="btn-save" id="saveLink" href="#" target="_blank">Kaydet</a>
    </div>

    <!-- ERROR -->
    <div class="error-box" id="errorBox"></div>

  </div>

  <footer>Sadece kişisel kullanım için · Kendi sunucunda çalışır</footer>

</div>

<script>
  const API = 'http://localhost:5000';
  let selectedQuality = '1080p';
  let pollTimer = null;

  // Quality buttons
  document.querySelectorAll('.q-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedQuality = btn.dataset.q;
    });
  });

  // Enter key
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchInfo();
  });

  function formatDuration(s) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    return `${m}:${String(sec).padStart(2,'0')}`;
  }

  function formatViews(n) {
    if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
    return n;
  }

  function showError(msg) {
    const el = document.getElementById('errorBox');
    el.textContent = '⚠ ' + msg;
    el.classList.add('visible');
  }

  function clearError() {
    document.getElementById('errorBox').classList.remove('visible');
  }

  async function fetchInfo() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return;

    clearError();
    document.getElementById('videoInfo').classList.remove('visible');
    document.getElementById('doneBox').classList.remove('visible');
    document.getElementById('progressArea').classList.remove('visible');

    const btn = document.getElementById('fetchBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>';

    try {
      const res = await fetch(`${API}/api/info`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({url})
      });
      const data = await res.json();

      if (data.error) { showError(data.error); return; }

      document.getElementById('thumb').src = data.thumbnail;
      document.getElementById('vidTitle').textContent = data.title;
      document.getElementById('vidChannel').textContent = data.channel;
      document.getElementById('vidDuration').textContent = formatDuration(data.duration);
      document.getElementById('vidViews').textContent = formatViews(data.view_count) + ' görüntüleme';
      document.getElementById('videoInfo').classList.add('visible');
    } catch(e) {
      showError('Sunucuya bağlanılamadı. Python sunucusu çalışıyor mu?');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Getir';
    }
  }

  async function startDownload() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { showError('Önce bir URL gir ve "Getir" butonuna bas.'); return; }

    clearError();
    document.getElementById('doneBox').classList.remove('visible');

    const dlBtn = document.getElementById('dlBtn');
    dlBtn.disabled = true;
    dlBtn.innerHTML = '<span class="spin"></span> Başlatılıyor...';

    const progressArea = document.getElementById('progressArea');
    const progressFill = document.getElementById('progressFill');
    const progressPct = document.getElementById('progressPct');
    const progressStatus = document.getElementById('progressStatus');
    const progressSpeed = document.getElementById('progressSpeed');
    const progressEta = document.getElementById('progressEta');

    progressFill.style.width = '0%';
    progressFill.classList.remove('done');
    progressArea.classList.add('visible');

    try {
      const res = await fetch(`${API}/api/download`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({url, quality: selectedQuality})
      });
      const {task_id, error} = await res.json();
      if (error) { showError(error); return; }

      // Poll progress
      pollTimer = setInterval(async () => {
        const pRes = await fetch(`${API}/api/progress/${task_id}`);
        const p = await pRes.json();

        if (p.status === 'downloading') {
          progressFill.style.width = p.percent + '%';
          progressPct.textContent = p.percent + '%';
          progressSpeed.textContent = p.speed || '—';
          progressEta.textContent = 'ETA: ' + (p.eta || '—');
          progressStatus.textContent = 'İndiriliyor...';
          dlBtn.innerHTML = `<span class="spin"></span> ${p.percent}% İndiriliyor`;
        } else if (p.status === 'processing') {
          progressFill.style.width = '99%';
          progressPct.textContent = '99%';
          progressStatus.textContent = 'İşleniyor (birleştiriliyor)...';
          dlBtn.innerHTML = '<span class="spin"></span> İşleniyor...';
        } else if (p.status === 'done') {
          clearInterval(pollTimer);
          progressFill.style.width = '100%';
          progressFill.classList.add('done');
          progressPct.textContent = '100%';
          progressStatus.textContent = 'Tamamlandı!';
          progressSpeed.textContent = '';
          progressEta.textContent = '';

          document.getElementById('doneFilename').textContent = p.filename || '';
          document.getElementById('saveLink').href = `${API}/api/file/${task_id}`;
          document.getElementById('doneBox').classList.add('visible');

          dlBtn.disabled = false;
          dlBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> Tekrar İndir`;
        } else if (p.status === 'error') {
          clearInterval(pollTimer);
          showError(p.error || 'Bilinmeyen hata');
          dlBtn.disabled = false;
          dlBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> İndir`;
          progressArea.classList.remove('visible');
        }
      }, 800);

    } catch(e) {
      showError('Sunucuya bağlanılamadı. Python sunucusu çalışıyor mu?');
      dlBtn.disabled = false;
      dlBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> İndir`;
    }
  }
</script>
</body>
</html>
